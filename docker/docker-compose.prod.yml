# Used by deploy-gcloud.sh — images are pulled from Artifact Registry.
# All variables are substituted by the deploy script before SCP-ing this file.
services:

  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    image: REGISTRY_SERVER_IMAGE
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      NODE_ENV: production
      MONGODB_URI: TMPL_MONGODB_URI
      CLIENT_ORIGIN: TMPL_CLIENT_URL
      COOKIE_SECRET: TMPL_COOKIE_SECRET
    depends_on:
      mongodb:
        condition: service_healthy

  client:
    image: REGISTRY_CLIENT_IMAGE
    restart: unless-stopped
    ports:
      - "80:8080"
    environment:
      PORT: "8080"
    depends_on:
      - server

volumes:
  mongo_data:
