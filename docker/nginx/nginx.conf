# ${PORT} is substituted at container startup by nginx's envsubst entrypoint.
# For local docker-compose PORT=80; for Cloud Run PORT=8080 (injected).
server {
    listen ${PORT};
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all routes served by index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for hashed static assets
    location ~* \.(js|css|woff2?|png|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # No cache for the entry point itself
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
