# BomberMP — Nginx reverse proxy (API only)
# Frontend is served via GitHub Pages.
# Handles TLS termination, HTTP→HTTPS redirect, and WebSocket proxying.
# Certs are managed by certbot (see deploy/scripts/init_certs.sh).

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile     on;
    keepalive_timeout 65;

    # Map WebSocket upgrade header:
    #   WS requests  → Connection: upgrade  (open WebSocket tunnel)
    #   HTTP requests → Connection: close    (normal proxying)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ─── Upstreams ────────────────────────────────────────────────────────────
    upstream server_upstream {
        server server:3001;
    }

    # ─── HTTP → HTTPS redirect ────────────────────────────────────────────────
    server {
        listen 80;
        server_name bombermpapi.avinashjha.space;
        return 301 https://$host$request_uri;
    }

    # ─── API + WebSocket (Socket.io) ──────────────────────────────────────────
    # Single location handles both HTTPS REST calls and WSS upgrades:
    #   - Browser REST fetch  → plain HTTP proxy
    #   - Socket.io connect   → WebSocket upgrade, nginx tunnels bidirectionally
    server {
        listen 443 ssl;
        server_name bombermpapi.avinashjha.space;

        ssl_certificate     /etc/letsencrypt/live/bombermpapi.avinashjha.space/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/bombermpapi.avinashjha.space/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        location / {
            proxy_pass         http://server_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Keep WebSocket connections open (also covers Socket.io long-polling)
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }

    # ─── Default: reject unknown hosts ────────────────────────────────────────
    server {
        listen 443 ssl default_server;
        ssl_certificate     /etc/letsencrypt/live/bombermpapi.avinashjha.space/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/bombermpapi.avinashjha.space/privkey.pem;
        return 444;
    }
}
