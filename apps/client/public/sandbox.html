<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BomberMP — Iframe Sandbox</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Toolbar ──────────────────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.6rem 1rem;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .toolbar label {
      font-size: 0.8rem;
      color: #a0a0c0;
    }

    .toolbar select,
    .toolbar input {
      background: #1a1a2e;
      color: #e0e0e0;
      border: 1px solid #0f3460;
      border-radius: 4px;
      padding: 0.3rem 0.5rem;
      font-size: 0.8rem;
    }

    .toolbar input[type="number"] {
      width: 70px;
    }

    .toolbar button {
      background: #533483;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 0.35rem 0.75rem;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .toolbar button:hover { background: #6a42a0; }

    .size-info {
      margin-left: auto;
      font-size: 0.75rem;
      color: #808090;
    }

    /* ── Iframe area ──────────────────────────────────── */
    .iframe-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      overflow: hidden;
    }

    .iframe-border {
      border: 2px dashed #0f3460;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      transition: width 0.3s, height 0.3s;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <label>Preset:</label>
    <select id="preset">
      <option value="960x540">CrazyGames 16:9 (960x540)</option>
      <option value="800x450">Mobile (800x450)</option>
      <option value="1080x607">Tablet (1080x607)</option>
      <option value="1280x720">HD 720p (1280x720)</option>
      <option value="1920x1080">Full HD (1920x1080)</option>
      <option value="640x480">Small 4:3 (640x480)</option>
      <option value="500x400">Tiny (500x400)</option>
      <option value="custom">Custom</option>
    </select>

    <label>W:</label>
    <input type="number" id="w" value="960" min="200" max="2560" />
    <label>H:</label>
    <input type="number" id="h" value="540" min="200" max="1440" />

    <button id="apply">Apply</button>
    <button id="reload">Reload</button>

    <span class="size-info" id="info">960 x 540</span>
  </div>

  <div class="iframe-area">
    <div class="iframe-border" id="border">
      <iframe id="frame" src="/"></iframe>
    </div>
  </div>

  <script>
    const preset = document.getElementById('preset');
    const wInput = document.getElementById('w');
    const hInput = document.getElementById('h');
    const border = document.getElementById('border');
    const frame  = document.getElementById('frame');
    const info   = document.getElementById('info');

    function resize(w, h) {
      // Fit within available space
      const area = document.querySelector('.iframe-area');
      const maxW = area.clientWidth - 32;
      const maxH = area.clientHeight - 32;
      const displayW = Math.min(w, maxW);
      const displayH = Math.min(h, maxH);

      border.style.width  = displayW + 'px';
      border.style.height = displayH + 'px';
      info.textContent = `${w} x ${h}` + (displayW < w || displayH < h ? ` (shown ${displayW}x${displayH})` : '');
    }

    function apply() {
      resize(parseInt(wInput.value), parseInt(hInput.value));
    }

    preset.addEventListener('change', () => {
      if (preset.value === 'custom') return;
      const [w, h] = preset.value.split('x').map(Number);
      wInput.value = w;
      hInput.value = h;
      apply();
    });

    document.getElementById('apply').addEventListener('click', apply);
    document.getElementById('reload').addEventListener('click', () => {
      frame.src = frame.src;
    });

    wInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') apply(); });
    hInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') apply(); });

    // Initial size
    apply();

    // Re-fit on window resize
    window.addEventListener('resize', apply);
  </script>
</body>
</html>
